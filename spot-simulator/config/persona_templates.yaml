# Persona templates — Phase 1~3 (legacy) + Phase Peer-A (skills / assets).
#
# Filled by sim-data-integrator on top of sim-infra-architect's schema skeleton.
#
# ─── Phase 1~3 legacy invariants (preserved as-is — DO NOT CHANGE) ─────
#   1) host_score has a detectable spread (homebody < weekend_explorer < planner
#      < night_social < spontaneous) — sim-analyst-qa uses this to validate the
#      host_score -> CREATE_SPOT correlation check.
#   2) dawn time_preferences are all < 0.1 so the "dawn filter" validation passes.
#   3) weekday/weekend coverage reflects the persona's real-world archetype.
#   4) budget_level spans 1..3 so budget_penalty() has variance.
#
# schedule_weights keys follow the format "{day_type}_{time_slot}" where
#   day_type  in {weekday, weekend}
#   time_slot in {dawn, morning, late_morning, lunch, afternoon, evening, night}
# All 14 keys are always present for each persona.
#
# ─── Phase Peer-A append-only fields (plan §4 / §4-1 / §4-3) ───────────
#   `_base_persona` anchor supplies defaults for peer-pivot fields.
#   YAML merge key `<<: *base_persona` merges those defaults **without
#   overwriting** any key already set on the persona — so every legacy
#   field (host_score / join_score / home_region / preferred_categories /
#   budget_level / time_preferences) is untouched.
#
#   peer fields added per persona:
#     role_preference, wallet_monthly, pocket_money_motivation,
#     time_budget_weekday, time_budget_weekend, space_level, space_type,
#     equipment, social_capital, reputation_score, skills{}
#
#   Invariants (loader checks — plan §4-3):
#     - skills dict keys  ∈ skills_catalog.yaml keys (=== SkillTopic values)
#     - equipment items   ∈ skills_catalog.yaml keys
#     - home_region       ∈ region_features.json region_ids
#     - each skill teach / learn appetite in [0,1]
#     - non-zero skill entries count in [3, 6]
#     - wallet_monthly    ∈ [10000, 60000]
#     - pocket_money_motivation ∈ [0, 1]

# ─────────────────────────────────────────────────────────────────────
# Base template (anchor) — plan §4-1
# ─────────────────────────────────────────────────────────────────────
_base_persona: &base_persona
  role_preference: "both"
  pocket_money_motivation: 0.50
  wallet_monthly: 25000
  time_budget_weekday: 3
  time_budget_weekend: 10
  space_level: 1
  space_type: "cafe"
  equipment: []
  social_capital: 0.5
  reputation_score: 0.5
  skills: {}

