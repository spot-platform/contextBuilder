# Skills catalog — plan §3-4 (Fee 2층 구조 + 실비 프로파일).
#
# 30 SkillTopic × (material / venue / equipment / mode distribution).
#
# 필드 규약:
#   material_cost_per_partner: int      — 식재료 / 물감 / 씨앗 등 실비 (원/인)
#   studio_rental_total:       int      — 스튜디오 대관료 총액 (원). 미사용 시 생략.
#   gym_rental_total:          int      — 클라이밍장/체육관 대관료 총액 (원). 미사용 시 생략.
#   equipment_rental_per_partner: int   — 장비 대여료 (원/인). host 미보유 시만 청구.
#   default_venue:             str      — "cafe" | "home" | "studio" | "park" | "gym"
#   teach_mode_distribution:   dict     — {mode: prob}. 합 == 1.0 (loader 검증).
#   level_floor_to_teach:      int      — 이 level 미만이면 teach 불가 (p_teach=0).
#
# 특수 venue 규칙 (엔진의 suggest_fee_breakdown 에서 처리):
#   - home / park  : venue_rental = 0
#   - cafe         : venue_rental = 2000 // expected_partners (catalog 에 명시 안 함)
#   - studio       : venue_rental = studio_rental_total // expected_partners
#   - gym          : venue_rental = gym_rental_total // expected_partners
#
# material_cost_per_partner 은 **필수** 키. 0 이어도 반드시 선언.

