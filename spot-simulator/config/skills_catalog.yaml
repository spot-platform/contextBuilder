  studio_rental_total: 12000             # 연습실 시간당 (실비)
  equipment_rental_per_partner: 0
  default_venue: "studio"
  teach_mode_distribution: { "1:1": 0.7, "small_group": 0.3 }
  level_floor_to_teach: 3

