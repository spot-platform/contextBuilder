schema_version: 1
generated_at: '2026-04-15'
source: hand_curated_mvp
tone_guide: 존댓말 + 또래 호스트 voice. 프로 느낌 어휘는 피하고 '같이 해봐요', '같이 확인' 같은 표현을 씁니다. 금지 어휘 목록은 scripts/build_plan_library.py
  의 PRO_WORDS 참고.
notes: 앱 cold start writing helper — 사용자가 '어떻게 진행하면 좋아?' 라고 물었을 때 보여줄 샘플 plan. 18 스킬 × 주요 teach_mode 로
  큐레이션. 각 entry 의 steps 를 그대로 복붙 가능한 수준으로 작성. pocket_money_tip 은 fee_reference.yaml 과 교차 참조해 사용자에게 한 줄
  조언으로 노출하면 좋음.
entries:
- skill: 기타
  teach_mode: '1:1'
  duration_minutes: 60
  style: 초보 친화
  steps:
  - time: +0분
    activity: 가볍게 인사하고 오늘 배우고 싶은 곡/목표 물어보기
  - time: +10분
    activity: 기본 자세와 코드 잡는 법 손봐드리기
  - time: +25분
    activity: 간단한 코드 진행 (Am, C, G) 같이 짚어보기
  - time: +45분
    activity: 한 소절 정도 같이 쳐보기
  - time: +55분
    activity: 오늘 해본 것 정리하고 다음에 뭐 해볼지 얘기
  pocket_money_tip: 1:1 은 집중도가 높아서 1.7~1.9만원 정도가 적당해요. 기타 빌려드리면 실비 2~3천원 더 붙이면 됩니다.
- skill: 기타
  teach_mode: small_group
  duration_minutes: 90
  style: 입문자 소그룹
  steps:
  - time: +0분
    activity: 서로 얼굴 익히고 기타 경험 간단히 공유
  - time: +10분
    activity: 악기 튜닝 같이 확인하고 파지법 짚어드리기
  - time: +30분
    activity: 쉬운 코드 진행 (Am, C, G) 소개
  - time: +55분
    activity: 같이 한 소절씩 쳐보면서 막히는 부분 봐드리기
  - time: +80분
    activity: 마무리 정리하고 다음 모임 때 뭐 해볼지 정하기
  pocket_money_tip: 3~4명 소그룹은 1.1만원 안팎이 좋아요. 기타 안 가져오는 분 있으면 장비 대여비 따로 표기해주세요.
- skill: 우쿨렐레
