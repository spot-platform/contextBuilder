  - time: +55분
    activity: 오늘 해본 것 정리하고 집에서 이어서 연습할 부분 알려드리기
  pocket_money_tip: 우쿨렐레 1:1 은 1.5만원대면 충분해요. 본인 악기 없으면 대여비 2천원 정도 따로 받으시면 됩니다.
