# SpotReview Layer 2 rule 파라미터.
#
# 출처: synthetic_content_pipeline_plan.md §5 Layer 2 + §7-3 review 분포.
# 소유자: validator-engineer (Phase 2).

# rule_rating_sentiment_match — rating → sentiment 강제 매핑
rating_sentiment_map:
  "1": "negative"
  "2": "negative"
  "3": "neutral"
  "4": "positive"
  "5": "positive"

# rule_noshow_mention_consistency — no_show_count > 0 일 때 금기 표현
forbidden_unanimous_terms:
  - "전원"
  - "모두"
  - "빠짐없이"
  - "모든 참가자"
  - "한 명도 빠지지"

# rule_satisfaction_tags_range — 태그 개수/길이 (schema 와 중복 안전망)
tag_min_count: 1
tag_max_count: 5
tag_min_length: 2
tag_max_length: 12

# rule_review_length_bucket_match — 버킷별 문장 수 범위
length_bucket_sentences:
  short: [1, 2]
  medium: [2, 4]
  long: [4, 8]
